<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MG — Prints</title>
  <meta name="description" content="Limited edition fine art prints by MG. Archival pigment prints on Hahnemühle FineArt Baryta." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --text: #e8e4df;
      --muted: #777;
      --dim: #444;
      --accent: #e8e4df;
      --border: #222;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-weight: 300;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::selection {
      background: rgba(232,228,223,0.15);
      color: var(--text);
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
    }

    .logo {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    .nav-link {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-link:hover { color: var(--text); }

    .hero {
      padding: 160px 48px 80px;
      max-width: 560px;
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.4rem, 5vw, 3.6rem);
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 24px;
    }

    .hero p {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.8;
      max-width: 420px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 0 48px 24px;
    }

    @media (max-width: 960px) {
      .grid { grid-template-columns: repeat(2, 1fr); } }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; gap: 20px; padding: 0 20px; }
      .hero { padding: 120px 20px 48px; }
      header { padding: 0 20px; }
    }

    .card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 1 / 1.5;
      background: var(--surface);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    .card:hover img { transform: scale(1.03); }

    .card-meta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 48px 20px 20px;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover .card-meta { opacity: 1; }

    .card-num {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .card-caption {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.1rem;
      line-height: 1.3;
    }

    #lb {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(10,10,10,0.96);
      align-items: center;
      justify-content: center;
    }
    #lb.open { display: flex; }

    #lb-img {
      max-height: 90vh;
      max-width: 54vw;
      object-fit: contain;
    }

    #lb-panel {
      width: 340px;
      padding: 0 0 0 56px;
      flex-shrink: 0;
    }

    #lb-num {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    #lb-caption {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2rem;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    #lb-material {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .size-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2px;
      margin-bottom: 24px;
    }

    .size-cell {
      background: var(--surface);
      padding: 14px 12px;
    }

    .size-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .size-dim { font-size: 12px; margin-bottom: 4px; }
    .size-edition { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .size-price { font-size: 13px; font-weight: 500; }

    .lb-cta {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: var(--bg);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      text-align: center;
      text-decoration: none;
    }
    .lb-cta:hover { opacity: 0.85; }

    .lb-note {
      font-size: 10px;
      color: var(--dim);
      margin-top: 12px;
      line-height: 1.6;
    }

    #lb-close {
      position: absolute;
      top: 24px; right: 32px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 8px;
    }
    #lb-close:hover { color: var(--text); }

    @media (max-width: 900px) {
      #lb { flex-direction: column; padding: 80px 24px 40px; overflow-y: auto; align-items: flex-start; }
      #lb-img { max-width: 100%; max-height: 60vw; width: 100%; }
      #lb-panel { width: 100%; padding: 32px 0 0; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">MG</a>
  <a class="nav-link" href="mailto:galustov@gmail.com">Contact</a>
</header>

  const grid = document.getElementById('grid');
  PRINTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${p.img}" alt="${p.caption}" />
      <div class="card-meta">
        <div class="card-num">Print ${p.id}</div>
        <div class="card-caption">${p.caption}</div>
      </div>
    `;
    card.addEventListener('click', () => openLB(p));
    grid.appendChild(card);
  });

  function openLB(p) {
    document.getElementById('lb-img').src = p.img;
    document.getElementById('lb-num').textContent = 'Print ' + p.id;
    document.getElementById('lb-caption').textContent = p.caption;
    document.getElementById('lb-material').textContent = p.material;
    document.getElementById('lb-cta').href = `mailto:galustov@gmail.com?subject=Inquiry%20—%20Print%20${p.id}&body=Hi%2C%20I%27m%20interested%20in%20Print%20${p.id}%20(${encodeURIComponent(p.caption)}).`;

      <div class="size-cell">
        <div class="size-label">${s.label}</div>
        <div class="size-dim">${s.dim}</div>
        <div class="size-edition">${s.edition}</div>
        <div class="size-price">${s.price}</div>
      </div>
    `).join('');
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLB() {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('lb').addEventListener('click', e => { if (e.target === document.getElementById('lb')) closeLB(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

</body>
</html>
